<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart | GMR E-Commerce Store</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <!-- Header Navigation -->
  <header>
    <div class="nav-container">
      <a href="/" class="logo">
        <div class="logo-dot"></div>
       GMR E-Commerce Store
      </a>
      <nav class="nav-menu">
        <a href="/" class="nav-link">Store</a>
        <a href="/admin.html" class="nav-link" id="admin-nav" style="display: none;">Admin Panel</a>
      </nav>
      <div class="nav-actions">
        <span id="user-badge" style="display: none; font-weight: 600; font-size: 0.9rem; color: var(--text-muted);"></span>
        <a href="/auth.html" id="auth-btn" class="btn btn-secondary">Sign In</a>
        <button id="logout-btn" class="btn btn-danger" style="display: none;">Sign Out</button>

        <a href="/cart.html" class="cart-icon-container">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <div class="cart-badge active" id="cart-badge-count">0</div>
        </a>
      </div>
    </div>
  </header>

  <!-- Cart Layout -->
  <main class="cart-layout">
    <div class="cart-items-section">
      <div class="cart-card-header">
        <span>Cart Contents</span>
        <button id="clear-cart-btn" class="btn btn-danger" style="padding: 0.4rem 0.8rem; font-size: 0.8rem;">Clear All</button>
      </div>
      
      <!-- Cart items container -->
      <div id="cart-items-container">
        <!-- JS inserts items dynamically -->
      </div>
    </div>

    <!-- Checkout Order Summary -->
    <div class="order-summary-card">
      <h3 class="summary-title">Summary Matrix</h3>
      
      <div class="summary-row">
        <span>Subtotal</span>
        <span id="summary-subtotal">$0.00</span>
      </div>
      <div class="summary-row">
        <span>Quantum Shipping</span>
        <span>FREE</span>
      </div>
      <div class="summary-row total">
        <span>Grand Total</span>
        <span id="summary-total">$0.00</span>
      </div>

      <form id="checkout-form" style="margin-top: 1.5rem;">
        <div class="form-group">
          <label for="shipping-address">Delivery Address</label>
          <textarea id="shipping-address" rows="3" placeholder="Enter physical coordinates / shipping address" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary checkout-btn" id="checkout-btn-submit">
          Process Order Checkout
        </button>
      </form>
    </div>
  </main>

  <div class="toast-container" id="toast-container"></div>

  <!-- Footer -->
  <footer>
    <div class="footer-content">
      <div class="logo" style="justify-content: center;">
        <div class="logo-dot"></div>
        GMR E-Commerce Store
      </div>
      <div class="footer-links">
        <a href="/">Catalog</a>
        <a href="/cart.html">Cart</a>
        <a href="/auth.html">Account</a>
      </div>
      <div>&copy; 2026 GMR E-Commerce Store Corp. All rights reserved. Powered by Antigravity.</div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('cart-items-container');
      const subtotalEl = document.getElementById('summary-subtotal');
      const totalEl = document.getElementById('summary-total');
      const clearBtn = document.getElementById('clear-cart-btn');
      const checkoutForm = document.getElementById('checkout-form');

      const renderCart = () => {
        const items = Cart.getItems();

        if (items.length === 0) {
          clearBtn.style.display = 'none';
          checkoutForm.style.display = 'none';
          container.innerHTML = `
            <div class="cart-empty-state">
              <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
              <h3>Cart is Empty</h3>
              <p>Your workspace is currently devoid of technological hardware.</p>
              <a href="/" class="btn btn-primary">Browse Store Catalog</a>
            </div>
          `;
          subtotalEl.textContent = '$0.00';
          totalEl.textContent = '$0.00';
          return;
        }

        clearBtn.style.display = 'block';
        checkoutForm.style.display = 'block';
        
        container.innerHTML = '';
        let total = 0;

        items.forEach(item => {
          const itemTotal = item.price * item.quantity;
          total += itemTotal;

          const itemEl = document.createElement('div');
          itemEl.className = 'cart-item';
          itemEl.innerHTML = `
            <div class="cart-item-image">
              <img src="${item.image_url}" alt="${item.name}">
            </div>
            <div class="cart-item-details">
              <h4 class="cart-item-title">${item.name}</h4>
              <span class="cart-item-category">${item.category}</span>
            </div>
            <div class="cart-item-action">
              <div class="quantity-control" style="height:36px;">
                <button class="quantity-btn dec-btn" data-id="${item.productId}">-</button>
                <input type="number" class="quantity-input" value="${item.quantity}" readonly style="width:40px; height:34px;">
                <button class="quantity-btn inc-btn" data-id="${item.productId}">+</button>
              </div>
              <div class="cart-item-price">$${itemTotal.toFixed(2)}</div>
              <button class="btn btn-danger remove-btn" data-id="${item.productId}" style="padding:0.4rem; height:36px; display:flex; align-items:center; justify-content:center;">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
              </button>
            </div>
          `;
          container.appendChild(itemEl);
        });

        subtotalEl.textContent = `$${total.toFixed(2)}`;
        totalEl.textContent = `$${total.toFixed(2)}`;

        // Attach event listeners
        document.querySelectorAll('.dec-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const id = parseInt(e.currentTarget.getAttribute('data-id'));
            const item = items.find(i => i.productId === id);
            if (item && item.quantity > 1) {
              Cart.updateQuantity(id, item.quantity - 1);
              renderCart();
              App.updateCartBadge();
            }
          });
        });

        document.querySelectorAll('.inc-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const id = parseInt(e.currentTarget.getAttribute('data-id'));
            const item = items.find(i => i.productId === id);
            if (item && item.quantity < item.maxStock) {
              Cart.updateQuantity(id, item.quantity + 1);
              renderCart();
              App.updateCartBadge();
            } else {
              App.showToast('Maximum available stock selected.', 'warning');
            }
          });
        });

        document.querySelectorAll('.remove-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const id = parseInt(e.currentTarget.getAttribute('data-id'));
            Cart.removeItem(id);
            renderCart();
            App.updateCartBadge();
            App.showToast('Item removed from cart.', 'success');
          });
        });
      };

      clearBtn.addEventListener('click', () => {
        Cart.clear();
        renderCart();
        App.updateCartBadge();
        App.showToast('Cart cleared.', 'success');
      });

      // Submit checkout form
      checkoutForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        if (!Auth.isLoggedIn()) {
          App.showToast('Please sign in to process checkout.', 'error');
          setTimeout(() => {
            window.location.href = '/auth.html';
          }, 1500);
          return;
        }

        const address = document.getElementById('shipping-address').value;
        const items = Cart.getItems().map(item => ({
          productId: item.productId,
          quantity: item.quantity
        }));

        try {
          const res = await Api.placeOrder(address, items);
          App.showToast(res.message, 'success');
          Cart.clear();
          renderCart();
          App.updateCartBadge();
          checkoutForm.reset();
        } catch (err) {
          App.showToast(err.message || 'Order failed.', 'error');
        }
      });

      // Init render
      renderCart();
    });
  </script>
</body>
</html>
