<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details | GMR E-Commerce Store</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <!-- Header Navigation -->
  <header>
    <div class="nav-container">
      <a href="/" class="logo">
        <div class="logo-dot"></div>
        GMR E-Commerce Store
      </a>
      <nav class="nav-menu">
        <a href="/" class="nav-link">Store</a>
        <a href="/admin.html" class="nav-link" id="admin-nav" style="display: none;">Admin Panel</a>
      </nav>
      <div class="nav-actions">
        <span id="user-badge" style="display: none; font-weight: 600; font-size: 0.9rem; color: var(--text-muted);"></span>
        <a href="/auth.html" id="auth-btn" class="btn btn-secondary">Sign In</a>
        <button id="logout-btn" class="btn btn-danger" style="display: none;">Sign Out</button>

        <a href="/cart.html" class="cart-icon-container">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <div class="cart-badge" id="cart-badge-count">0</div>
        </a>
      </div>
    </div>
  </header>

  <!-- Product Details Layout -->
  <main class="detail-container" id="product-detail-container">
    <div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 4rem 0;">
      Retrieving holographic specifications...
    </div>
  </main>

  <div class="toast-container" id="toast-container"></div>

  <!-- Footer -->
  <footer>
    <div class="footer-content">
      <div class="logo" style="justify-content: center;">
        <div class="logo-dot"></div>
        GMR E-Commerce Store
      </div>
      <div class="footer-links">
        <a href="/">Catalog</a>
        <a href="/cart.html">Cart</a>
        <a href="/auth.html">Account</a>
      </div>
      <div>&copy; 2026 GMR E-Commerce Store Corp. All rights reserved. Powered by Antigravity.</div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/app.js"></script>
  <script>
    // Local script to render product details page on load
    document.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const productId = urlParams.get('id');
      const container = document.getElementById('product-detail-container');

      if (!productId) {
        container.innerHTML = `
          <div style="grid-column: 1/-1; text-align: center; padding: 4rem 0;">
            <h2 style="margin-bottom:1rem;">No Product Specified</h2>
            <a href="/" class="btn btn-primary">Return to Catalog</a>
          </div>
        `;
        return;
      }

      try {
        const product = await Api.getProductDetails(productId);
        
        document.title = `${product.name} | GMR E-Commerce Store`;

        const isOutOfStock = product.stock <= 0;

        container.innerHTML = `
          <div class="detail-gallery">
            <img src="${product.image_url}" alt="${product.name}">
          </div>
          <div class="detail-content">
            <div class="detail-meta">
              <span class="detail-category">${product.category}</span>
              <span class="detail-stock-badge" style="
                background: ${isOutOfStock ? 'rgba(239, 68, 68, 0.1)' : 'rgba(16, 185, 129, 0.1)'};
                color: ${isOutOfStock ? 'var(--error)' : 'var(--success)'};
                border-color: ${isOutOfStock ? 'rgba(239, 68, 68, 0.2)' : 'rgba(16, 185, 129, 0.2)'};
              ">
                ${isOutOfStock ? 'Out of Stock' : `In Stock: ${product.stock}`}
              </span>
            </div>
            <h2 class="detail-title">${product.name}</h2>
            <div class="detail-price">$${product.price.toFixed(2)}</div>
            <p class="detail-description">${product.description}</p>
            
            <div class="purchase-panel">
              <div class="quantity-selector">
                <span style="font-weight:600; font-size:0.9rem;">Quantity</span>
                <div class="quantity-control">
                  <button class="quantity-btn" id="qty-dec" ${isOutOfStock ? 'disabled' : ''}>-</button>
                  <input type="number" id="qty-input" class="quantity-input" value="1" min="1" max="${product.stock}" readonly>
                  <button class="quantity-btn" id="qty-inc" ${isOutOfStock ? 'disabled' : ''}>+</button>
                </div>
              </div>
              
              <button class="btn btn-primary" id="add-to-cart-detail" style="justify-content:center; padding:0.9rem;" ${isOutOfStock ? 'disabled' : ''}>
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                ${isOutOfStock ? 'Sold Out' : 'Initialize Add to Cart'}
              </button>
            </div>
          </div>
        `;

        if (isOutOfStock) return;

        // Setup detail page event handlers
        const qtyInput = document.getElementById('qty-input');
        const decBtn = document.getElementById('qty-dec');
        const incBtn = document.getElementById('qty-inc');
        const addToCartBtn = document.getElementById('add-to-cart-detail');

        decBtn.addEventListener('click', () => {
          let val = parseInt(qtyInput.value) || 1;
          if (val > 1) {
            qtyInput.value = val - 1;
          }
        });

        incBtn.addEventListener('click', () => {
          let val = parseInt(qtyInput.value) || 1;
          if (val < product.stock) {
            qtyInput.value = val + 1;
          }
        });

        addToCartBtn.addEventListener('click', () => {
          const qty = parseInt(qtyInput.value) || 1;
          Cart.addItem(product.id, product.name, product.price, product.image_url, product.category, qty, product.stock);
          App.showToast(`Synthesized ${qty}x ${product.name} into cart!`, 'success');
        });

      } catch (err) {
        console.error(err);
        container.innerHTML = `
          <div style="grid-column: 1/-1; text-align: center; padding: 4rem 0;">
            <h2 style="margin-bottom:1rem; color:var(--error);">Failed to load product specifications</h2>
            <a href="/" class="btn btn-secondary">Back to Store</a>
          </div>
        `;
      }
    });
  </script>
</body>
</html>
